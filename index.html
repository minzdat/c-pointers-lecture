                        <span className="text-white">)</span>
                    </div>

                    <p className="text-emerald-800 text-sm sm:text-base mt-6 bg-emerald-100 p-4 rounded-xl font-medium break-words w-full leading-relaxed border border-emerald-200">
                        {t.arrays.tipExpanded3}
                    </p>
                </div>
              </div>

              <MiniExercise q={t.arrays.exQ} ansCode={t.arrays.exCode} ansExp={t.arrays.exExp} t={t} />
            </div>
          );
        };

        // Component mới: BÀI TẬP TỔNG HỢP thay thế cho Trắc nghiệm cũ
        const ComprehensiveExercises = ({ t }) => {
           const [openIndex, setOpenIndex] = useState(null);

           const toggleAccordion = (index) => {
               setOpenIndex(openIndex === index ? null : index);
           };

           return (
            <div className="w-full max-w-5xl mx-auto py-4 sm:py-8 animate-fadeIn flex flex-col">
              <div className="text-center mb-10 sm:mb-12">
                  <h2 className="text-3xl sm:text-4xl font-black text-slate-800 mb-4 break-words w-full inline-flex justify-center items-center gap-3">
                    <Code2 className="text-blue-600 w-8 h-8 sm:w-10 sm:h-10 shrink-0" />
                    <span>{t.exercisesTab.title}</span>
                  </h2>
                  <p className="text-slate-600 text-base sm:text-lg max-w-3xl mx-auto leading-relaxed font-medium">
                      {t.exercisesTab.desc}
                  </p>
              </div>
              
              <div className="space-y-6 sm:space-y-8 w-full">
                 {t.exercisesTab.list.map((ex, idx) => {
                    const isOpen = openIndex === idx;
                    return (
                        <div key={idx} className={`bg-white rounded-3xl shadow-sm border-2 transition-all duration-300 w-full overflow-hidden flex flex-col ${isOpen ? 'border-blue-300 shadow-md' : 'border-slate-200 hover:border-blue-200'}`}>
                            
                            {/* Khối Đề Bài (Luôn hiện) */}
                            <div className="p-5 sm:p-8 cursor-pointer group" onClick={() => toggleAccordion(idx)}>
                                <div className="flex items-center gap-3 mb-4">
                                    <span className={`text-[10px] sm:text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider border ${ex.lvlClass}`}>
                                        {ex.level}
                                    </span>
                                </div>
                                <h3 className="text-xl sm:text-2xl font-bold text-slate-800 mb-4 group-hover:text-blue-700 transition-colors flex items-start justify-between gap-4">
                                    <span className="break-words w-full">{ex.title}</span>
                                    <div className="shrink-0 bg-slate-100 p-2 rounded-full mt-1">
                                        {isOpen ? <ChevronUp size={20} className="text-blue-600"/> : <ChevronDown size={20} className="text-slate-400"/>}
                                    </div>
                                </h3>
                                <div className="bg-slate-50 border border-slate-200 p-4 sm:p-5 rounded-2xl">
                                    <p className="text-slate-700 text-sm sm:text-base leading-relaxed break-words w-full m-0 font-medium">
                                        <strong className="text-slate-900 block mb-1">Yêu cầu:</strong> {ex.req}
                                    </p>
                                </div>
                            </div>

                            {/* Khối Đáp Án (Đóng/Mở) */}
                            <div className={`transition-all duration-500 ease-in-out w-full flex flex-col ${isOpen ? 'max-h-[2000px] opacity-100' : 'max-h-0 opacity-0'}`}>
                                <div className="border-t border-slate-200 bg-slate-50/50 p-5 sm:p-8 w-full flex flex-col">
                                    <h4 className="font-bold text-slate-800 mb-4 flex items-center gap-2 text-sm sm:text-base">
                                        <CheckCircle size={20} className="text-green-500" /> Đáp án gợi ý:
                                    </h4>
                                    
                                    <div className="w-full relative max-w-full overflow-hidden bg-[#1e1e1e] rounded-2xl shadow-inner border border-slate-700 mb-6 flex flex-col">
                                        <div className="bg-[#2d2d2d] px-4 py-2.5 flex justify-between items-center border-b border-[#111] shrink-0 w-full">
                                            <div className="flex gap-2">
                                                <div className="w-3 h-3 rounded-full bg-red-500 shadow-inner"></div>
                                                <div className="w-3 h-3 rounded-full bg-yellow-500 shadow-inner"></div>
                                                <div className="w-3 h-3 rounded-full bg-green-500 shadow-inner"></div>
                                            </div>
                                            <span className="text-xs text-slate-400 font-mono">solution.c</span>
                                        </div>
                                        <div className="p-4 sm:p-6 overflow-x-auto light-scrollbar w-full text-slate-200 font-medium leading-loose text-xs sm:text-sm">
                                            <pre className="whitespace-pre"><code className="break-normal">{ex.ansCode}</code></pre>
                                        </div>
                                    </div>

                                    <div className="bg-blue-50 border border-blue-100 p-4 sm:p-6 rounded-2xl text-blue-900 text-sm sm:text-base leading-relaxed font-medium shadow-sm w-full break-words">
                                        <strong className="block mb-2 text-blue-700"><Lightbulb className="inline mb-1 mr-1" size={18}/> Mấu chốt của bài toán:</strong>
                                        {ex.ansExp}
                                    </div>
                                </div>
                            </div>
                        </div>
                    );
                 })}
              </div>
            </div>
          );
        };

        // ==========================================
        // 4. MAIN APP COMPONENT
        // ==========================================
        function App() {
          const [lang, setLang] = useState('vi');
          const [activeTab, setActiveTab] = useState('intro');

          const t = DICT[lang];

          const renderContent = () => {
            switch (activeTab) {
              case 'intro': return <ContentIntro t={t} />;
              case 'basics': return <ContentBasics t={t} />;
              case 'functions': return <ContentFunctions t={t} />;
              case 'arrays': return <ContentArrays t={t} />;
              case 'exercises': return <ComprehensiveExercises t={t} />;
              default: return <ContentIntro t={t} />;
            }
          };

          const toggleLang = () => {
            setLang(prev => prev === 'vi' ? 'en' : 'vi');
          };

          return (
            // Thêm padding-top (pt-20) vào container tổng để nội dung không bị Header đè lên
            <div className="min-h-screen flex flex-col font-sans selection:bg-blue-200 bg-[#f8fafc] w-full pt-20">
              
              {/* Header Fixed Cố Định (Z-index cao nhất, mờ nền) */}
              <header className="bg-slate-900/95 backdrop-blur-xl text-white shadow-xl fixed top-0 left-0 right-0 z-[100] border-b border-slate-800 w-full">
                <div className="max-w-[1600px] mx-auto px-3 sm:px-4 lg:px-6 py-3 flex items-center justify-between w-full h-16 sm:h-20">
                  <div className="flex items-center gap-2 sm:gap-4 shrink-0">
                    <div className="bg-gradient-to-br from-blue-500 to-indigo-600 p-2 rounded-xl shadow-lg border border-white/10 shrink-0">
                      <Cpu size={28} className="text-white" />
                    </div>
                    <div className="flex flex-col">
                      <h1 className="text-lg sm:text-xl lg:text-2xl font-black tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-300 whitespace-nowrap overflow-hidden text-ellipsis max-w-[200px] sm:max-w-none">{t.header.title}</h1>
                      <p className="text-slate-400 text-[10px] sm:text-xs lg:text-sm hidden sm:block font-medium truncate">{t.header.subtitle}</p>
                    </div>
                  </div>
                  <button 
                    onClick={toggleLang}
                    className="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 text-slate-200 px-4 py-2 rounded-full font-bold transition-all border border-slate-600 hover:border-slate-400 text-xs sm:text-sm shadow-inner active:scale-95 shrink-0"
                  >
                    <Globe size={16} className=""/>
                    <span className="whitespace-nowrap">{t.header.langBtn}</span>
                  </button>
                </div>
              </header>

              {/* Main Layout */}
              <div className="flex-1 max-w-[1600px] mx-auto w-full flex flex-col xl:flex-row gap-4 sm:gap-6 lg:gap-8 p-3 sm:p-4 lg:p-6 my-2 sm:my-4 z-10">
                
                {/* Sidebar Navigation */}
                <aside className="w-full xl:w-[280px] shrink-0 xl:sticky xl:top-[100px] h-fit z-40">
                  <nav className="bg-white/90 backdrop-blur-md rounded-2xl shadow-sm border border-slate-200 p-2 sm:p-3 flex flex-row xl:flex-col gap-1.5 sm:gap-2 overflow-x-auto no-scrollbar w-full">
                    {t.tabs.map((tab) => {
                      const Icon = tab.icon;
                      const isActive = activeTab === tab.id;
                      return (
                        <button
                          key={tab.id}
                          onClick={() => {
                            setActiveTab(tab.id);
                            if (window.innerWidth < 1280) {
                              window.scrollTo({ top: 0, behavior: 'smooth' });
                            }
                          }}
                          className={`flex items-center gap-2 sm:gap-3 px-3 sm:px-4 py-2.5 sm:py-3 lg:py-3.5 rounded-xl text-left whitespace-nowrap transition-all duration-200 text-xs sm:text-sm lg:text-base font-semibold shrink-0 xl:shrink w-auto xl:w-full ${
                            isActive 
                              ? 'bg-blue-50 text-blue-700 border border-blue-200 shadow-sm xl:scale-[1.02]' 
                              : 'text-slate-600 hover:bg-slate-100 hover:text-slate-900 border border-transparent'
                          }`}
                        >
                          <Icon size={20} className={`shrink-0 w-4 h-4 sm:w-5 sm:h-5 ${isActive ? 'text-blue-600' : 'text-slate-400'}`} />
                          <span className="truncate">{tab.title}</span>
                          <ChevronRight size={18} className="ml-auto hidden xl:block opacity-50 shrink-0" />
                        </button>
                      )
                    })}
                  </nav>
                </aside>

                {/* Content Area */}
                <main className="flex-1 bg-white rounded-2xl sm:rounded-3xl shadow-lg border border-slate-100 p-4 sm:p-6 lg:p-10 xl:p-12 min-h-[500px] md:min-h-[700px] flex flex-col relative w-full overflow-hidden">
                  {renderContent()}
                </main>

              </div>
              
              {/* Footer */}
              <footer className="py-6 sm:py-8 text-center text-slate-400 text-[10px] sm:text-xs lg:text-sm mt-auto px-4 font-medium break-words w-full">
                <p>Designed with Flexbox Solid Layout & Interactive UX principles. 100% Production-Ready Responsive.</p>
              </footer>
            </div>
          );
        }

        // Khởi tạo React
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
